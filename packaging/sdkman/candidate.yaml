# SDKMAN! candidate metadata for MockServer CLI
#
# SDKMAN! does not use a file-based manifest — candidates are registered
# and updated via the SDKMAN! Vendor API (https://sdkman.io/vendors).
# This file documents the candidate configuration for reference.
#
# TODO(cli-release): Replace all placeholder URLs once the CLI's GitHub
# Releases artifact naming is finalised.

candidate: mockserver
name: MockServer
description: "Mock, proxy & record HTTP(S), gRPC, and async messaging for testing"
website: https://www.mock-server.com
distribution: PLATFORM_SPECIFIC

# Platform mappings — SDKMAN uses these identifiers:
#   LINUX_64, LINUX_ARM64, MAC_OSX, MAC_ARM64, WINDOWS_64
#
# TODO(cli-release): Confirm binary names and which platforms are supported
platforms:
  LINUX_64:
    url: https://github.com/mock-server/mockserver-monorepo/releases/download/mockserver-${VERSION}/mockserver-linux-x64
    checksum: ${SHA256_LINUX_X64}
  LINUX_ARM64:
    url: https://github.com/mock-server/mockserver-monorepo/releases/download/mockserver-${VERSION}/mockserver-linux-arm64
    checksum: ${SHA256_LINUX_ARM64}
  MAC_OSX:
    url: https://github.com/mock-server/mockserver-monorepo/releases/download/mockserver-${VERSION}/mockserver-darwin-x64
    checksum: ${SHA256_DARWIN_X64}
  MAC_ARM64:
    url: https://github.com/mock-server/mockserver-monorepo/releases/download/mockserver-${VERSION}/mockserver-darwin-arm64
    checksum: ${SHA256_DARWIN_ARM64}
  WINDOWS_64:
    url: https://github.com/mock-server/mockserver-monorepo/releases/download/mockserver-${VERSION}/mockserver-windows-x64.exe
    checksum: ${SHA256_WINDOWS_X64}
