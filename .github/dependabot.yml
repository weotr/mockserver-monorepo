version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/mockserver"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 20
    labels:
      - "dependencies"
      - "java"
    groups:
      maven-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Future Java floor or namespace migrations may add ignores here.
      # The javax → jakarta block was removed when the codebase migrated.
      # checkstyle 13.x requires Java 21 runtime; we target Java 17.
      # Pin the ceiling below 13.0.0 — this is stricter than ignoring only
      # semver-major bumps and keeps us on the Java-17-compatible 12.x line.
      - dependency-name: "com.puppycrawl.tools:checkstyle"
        versions: [">=13.0.0"]
      # Infinispan 15.x requires Java 21 runtime; we target Java 17.
      # Pin the ceiling below 15.0.0 to stay on the Java-17-compatible 14.0.x line.
      - dependency-name: "org.infinispan:infinispan-core"
        versions: [">=15.0.0"]

  - package-ecosystem: "maven"
    directory: "/mockserver/mockserver-maven-plugin"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "java"
      - "maven-plugin"
    groups:
      maven-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # checkstyle 13.x requires Java 21 runtime; we target Java 17.
      # Pin the ceiling below 13.0.0 — this is stricter than ignoring only
      # semver-major bumps and keeps us on the Java-17-compatible 12.x line.
      - dependency-name: "com.puppycrawl.tools:checkstyle"
        versions: [">=13.0.0"]

  - package-ecosystem: "npm"
    directories:
      - "/mockserver-ui"
      - "/mockserver-client-node"
      - "/mockserver-node"
      - "/.opencode"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    groups:
      npm-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "pip"
    directory: "/mockserver-client-python"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    groups:
      pip-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "bundler"
    directories:
      - "/mockserver-client-ruby"
      - "/jekyll-www.mock-server.com"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "ruby"
    groups:
      bundler-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "docker"
    directories:
      - "/docker"
      - "/docker/root"
      - "/docker/root-snapshot"
      - "/docker/snapshot"
      - "/docker/graaljs"
      - "/docker/local"
      - "/docker_build/maven"
      - "/docker_build/performance"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "docker"
    groups:
      docker-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "terraform"
    directories:
      - "/terraform/buildkite-agents"
      - "/terraform/buildkite-pipelines"
      - "/terraform/ses-email-forwarding"
      - "/terraform/website"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "terraform"
    groups:
      terraform-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
