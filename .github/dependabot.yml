version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/mockserver"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "java"
    ignore:
      # Java 11 / javax compatibility — block versions that require Java 17 or
      # the jakarta namespace. `versions:` ignores apply to security updates too
      # (unlike `update-types`, which security updates bypass).
      - dependency-name: "org.springframework:*"          # Spring 6.x requires Java 17
        versions: [">=6"]
      - dependency-name: "org.springframework.boot:*"     # Spring Boot 3.x requires Java 17
        versions: [">=3"]
      - dependency-name: "org.apache.tomcat.embed:*"      # Tomcat 10+ = jakarta; Tomcat 11 = Java 17
        versions: [">=10"]
      - dependency-name: "org.eclipse.jetty:*"            # Jetty 10+ = jakarta; Jetty 12 = Java 17
        versions: [">=10"]
      - dependency-name: "org.junit.jupiter:*"            # JUnit 6.x (anticipated Java 17+ floor — review when released)
        versions: [">=6"]
      - dependency-name: "com.github.eirslett:frontend-maven-plugin"  # 2.x requires Java 17
        versions: [">=2"]
      # Defensive guard: javax.servlet:javax.servlet-api topped out at 4.0.1
      # (the jakarta migration republished under jakarta.servlet:*), so a v5
      # of this coordinate is not expected — block any future bump anyway.
      - dependency-name: "javax.servlet:*"
        versions: [">=5"]
      # Block Jakarta EE 9+ namespace migration (javax → jakarta, incompatible
      # with MockServer's javax codebase). Not a JVM requirement.
      - dependency-name: "jakarta.xml.bind:*"
        versions: [">=3"]
      - dependency-name: "jakarta.activation:*"
        versions: [">=2"]
      - dependency-name: "jakarta.validation:*"
        versions: [">=3"]
      # Major-version bumps with non-Java-17 reasons to hold back (review individually)
      - dependency-name: "io.prometheus:*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "com.networknt:json-schema-validator"
        update-types: ["version-update:semver-major"]
      - dependency-name: "com.puppycrawl.tools:checkstyle"
        update-types: ["version-update:semver-major"]
      - dependency-name: "net.javacrumbs.json-unit:json-unit-core"
        update-types: ["version-update:semver-major"]
      - dependency-name: "com.jayway.jsonpath:json-path"
        update-types: ["version-update:semver-major"]
      - dependency-name: "com.fasterxml.uuid:java-uuid-generator"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "maven"
    directory: "/mockserver/mockserver-maven-plugin"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "java"
      - "maven-plugin"
    ignore:
      # Java 11 / javax compatibility — mirror /mockserver ignore rules.
      # `versions:` form applies to security updates too.
      - dependency-name: "org.springframework:*"          # Spring 6.x requires Java 17
        versions: [">=6"]
      - dependency-name: "org.springframework.boot:*"     # Spring Boot 3.x requires Java 17
        versions: [">=3"]
      - dependency-name: "io.prometheus:*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "com.puppycrawl.tools:checkstyle"
        update-types: ["version-update:semver-major"]
      - dependency-name: "com.networknt:json-schema-validator"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/mockserver-ui"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
      - "ui"

  - package-ecosystem: "npm"
    directory: "/mockserver-client-node"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"

  - package-ecosystem: "npm"
    directory: "/mockserver-node"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"

  - package-ecosystem: "pip"
    directory: "/mockserver-client-python"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "bundler"
    directory: "/mockserver-client-ruby"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ruby"

  - package-ecosystem: "npm"
    directory: "/.opencode"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"

  - package-ecosystem: "docker"
    directories:
      - "/docker"
      - "/docker/root"
      - "/docker/root-snapshot"
      - "/docker/snapshot"
      - "/docker/graaljs"
      - "/docker/local"
      - "/docker_build/maven"
      - "/docker_build/performance"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
