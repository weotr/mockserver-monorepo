services:
  # Stand-in upstream the proxy forwards to and validates against.
  upstream:
    image: mockserver/mockserver:latest
    ports:
      - "1090:1090"
    environment:
      MOCKSERVER_LOG_LEVEL: INFO
      MOCKSERVER_SERVER_PORT: 1090
      MOCKSERVER_INITIALIZATION_JSON_PATH: /config/upstream.json
    volumes:
      - ./config:/config

  # Validation proxy: forwards every request to the upstream and validates both
  # the request and the response against the mounted OpenAPI spec.
  mockserver:
    image: mockserver/mockserver:latest
    depends_on:
      - upstream
    ports:
      - "1080:1080"
    environment:
      MOCKSERVER_LOG_LEVEL: INFO
      MOCKSERVER_SERVER_PORT: 1080
      # The httpForwardValidateAction in the initializer references the spec by
      # its mounted path, so the spec must be available to this container too.
      MOCKSERVER_INITIALIZATION_JSON_PATH: /config/validation-proxy.json
    volumes:
      - ./config:/config
