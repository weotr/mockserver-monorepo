# Artifact Hub repository metadata for the MockServer OCI Helm chart.
#
# The chart is published to GitHub Container Registry as an OCI artifact
# (oci://ghcr.io/mock-server/charts/mockserver). To list it on https://artifacthub.io so it is
# discoverable, this metadata file must be published to the registry root and the repository
# registered once in the Artifact Hub control panel.
#
# One-time bootstrap (manual — needs an Artifact Hub account):
#   1. Artifact Hub → Control Panel → Repositories → Add → kind "Helm charts", OCI based,
#      URL: oci://ghcr.io/mock-server/charts
#   2. Copy the generated Repository ID into `repositoryID` below.
#   3. Publish this file to the registry root so Artifact Hub can verify ownership:
#        oras push ghcr.io/mock-server/charts:artifacthub.io \
#          artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml
#      (or upload it via the control panel). Thereafter Artifact Hub auto-indexes new chart
#      versions pushed to the registry.
#
# See docs/infrastructure/helm.md ("Artifact Hub") for the full procedure.

repositoryID: "a6ca1874-16c1-43c8-9924-9bf9c3a5a9ea"
