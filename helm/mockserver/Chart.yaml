apiVersion: v1
name: mockserver
version: "7.0.0"
appVersion: "7.0.0"
description: Chart to deploy MockServer to Kubernetes.  MockServer is a mocking, debugging proxy and chaos engineering tool for multiple protocols (HTTP, HTTPS, gRPC, TCP and more) — mock any system you integrate with, record, replay and verify traffic, and inject faults for resilience testing.  Its proxy introspects all proxied traffic including encrypted TLS and supports Port Forwarding, Web Proxying (i.e. HTTP proxy), HTTPS Tunneling Proxying (using HTTP CONNECT) and SOCKS Proxying (i.e. dynamic port forwarding).  Clients are available for Java, JavaScript, Python, Ruby, Go, .NET and more.
keywords:
  - mocking
  - mock-server
  - http-mock
  - http
  - test
  - test-server
  - proxy
  - http-proxy
  - socks-proxy
  - https-proxy
  - debugging-proxy
  - grpc
  - tcp
  - chaos-engineering
  - fault-injection
home: "https://www.mock-server.com"
sources:
  - "https://github.com/mock-server/mockserver-monorepo"
  - "https://hub.docker.com/r/mockserver/mockserver"
  - "https://gallery.ecr.aws/mockserver/mockserver"
maintainers:
  - name: James D Bloom
    email: jamesdbloom+mockserver@gmail.com
icon: https://www.mock-server.com/apple-touch-icon.png
annotations:
  # Artifact Hub listing metadata (https://artifacthub.io). name/description/keywords/home/sources/
  # maintainers/icon above are read natively; these add the license and quick links.
  artifacthub.io/license: Apache-2.0
  # Populates the Artifact Hub "Changelog" tab for this version (without it the
