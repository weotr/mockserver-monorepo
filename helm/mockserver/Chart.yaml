apiVersion: v1
name: mockserver
version: "7.0.0"
appVersion: "7.0.0"
description: Chart to deploy MockServer to Kubernetes.  MockServer enables easy mocking of any system you integrate with via HTTP or HTTPS with clients written in Java, JavaScript and Ruby.  MockServer also includes a proxy that introspects all proxied traffic including encrypted SSL traffic and supports Port Forwarding, Web Proxying (i.e. HTTP proxy), HTTPS Tunneling Proxying (using HTTP CONNECT) and SOCKS Proxying (i.e. dynamic port forwarding).
keywords:
  - mocking
  - mock-server
  - http-mock
  - http
  - test
  - test-server
  - proxy
  - http-proxy
  - socks-proxy
  - https-proxy
home: "http://mock-server.com"
sources:
  - "https://github.com/mock-server/mockserver-monorepo"
  - "https://hub.docker.com/r/mockserver/mockserver"
  - "https://gallery.ecr.aws/mockserver/mockserver"
maintainers:
  - name: James D Bloom
    email: jamesdbloom+mockserver@gmail.com
icon: http://mock-server.com/apple-touch-icon.png
annotations:
  # Artifact Hub listing metadata (https://artifacthub.io). name/description/keywords/home/sources/
  # maintainers/icon above are read natively; these add the license and quick links.
  artifacthub.io/license: Apache-2.0
  artifacthub.io/links: |
    - name: Documentation
      url: https://www.mock-server.com
    - name: Chart install guide
      url: https://github.com/mock-server/mockserver-monorepo/blob/master/helm/mockserver/README.md
    - name: Signing public key (cosign)
      url: https://www.mock-server.com/mockserver-cosign.pub
