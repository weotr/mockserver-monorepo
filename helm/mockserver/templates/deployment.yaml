apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "release.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ template "chart.name" . }}
    release: {{ .Release.Name }}
    chart: {{ template "chart.name_version" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ template "chart.name" . }}
      release: {{ .Release.Name }}
  template:
    metadata:
{{- if or .Values.app.config.enabled .Values.podAnnotations }}
      annotations:
{{- if .Values.app.config.enabled }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
{{- end }}
{{- if .Values.podAnnotations }}
{{ toYaml .Values.podAnnotations | indent 8 }}
{{- end }}
{{- end }}
      name: {{ template "release.name" . }}
      labels:
        app: {{ template "chart.name" . }}
        release: {{ .Release.Name }}
{{- if .Values.podLabels }}
{{ toYaml .Values.podLabels | indent 8 }}
{{- end }}
    spec:
      serviceAccountName: {{ .Values.app.serviceAccountName }}
{{- with .Values.podSecurityContext }}
      securityContext:
{{ toYaml . | indent 8 }}
{{- end }}
{{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml .Values.imagePullSecrets | indent 8 }}
{{- end }}
{{- if and .Values.sidecar.transparentProxy .Values.sidecar.iptables.enabled }}
      initContainers:
        # Redirects outbound TCP on the configured ports to MockServer's transparent
        # proxy port so traffic is intercepted without application changes. Requires
        # a privileged init container with NET_ADMIN to apply iptables rules. Skip
        # this init container if the platform applies the rules another way.
        - name: iptables-init
          image: {{ .Values.sidecar.iptables.image | quote }}
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
          command:
            - sh
            - -c
            - |
              set -e
              # Exclude MockServer's own egress (by UID) BEFORE any REDIRECT rules
              # to prevent an infinite redirect loop when MockServer forwards upstream.
              iptables -t nat -I OUTPUT -m owner --uid-owner {{ .Values.sidecar.iptables.excludeUid | default .Values.app.runAsUser }} -j RETURN
              for port in $(echo "{{ .Values.sidecar.iptables.redirectPorts }}" | tr ',' ' '); do
                iptables -t nat -A OUTPUT -p tcp --dport "$port" -j REDIRECT --to-ports {{ .Values.sidecar.iptables.proxyPort }}
              done
              echo "iptables REDIRECT rules applied for ports {{ .Values.sidecar.iptables.redirectPorts }} -> {{ .Values.sidecar.iptables.proxyPort }} (excludeUid={{ .Values.sidecar.iptables.excludeUid | default .Values.app.runAsUser }})"
{{- end }}
      containers:
        - name: {{ template "release.name" . }}
          image: {{ if .Values.image.repositoryNameAndTag }}{{ .Values.image.repositoryNameAndTag }}{{- else }}{{ .Values.image.repository }}/mockserver:mockserver-{{- if .Values.image.snapshot }}snapshot{{- else }}{{ .Chart.AppVersion }}{{- end }}{{- end }}
{{- if .Values.image.snapshot }}
          imagePullPolicy: Always
{{- else }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
{{- end }}
          securityContext:
{{- if .Values.app.runAsUser }}
            runAsUser: {{ .Values.app.runAsUser }}
{{- end }}
            readOnlyRootFilesystem: {{ .Values.app.readOnlyRootFilesystem }}
            allowPrivilegeEscalation: false
{{- if and .Values.sidecar.transparentProxy .Values.sidecar.netAdmin }}
            capabilities:
              add:
                - NET_ADMIN
{{- end }}
          ports:
            - name: serviceport
              containerPort: {{ .Values.app.serverPort }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /liveness/probe
              port: serviceport
            initialDelaySeconds: 2
            periodSeconds: 2
            successThreshold: 1
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /liveness/probe
              port: serviceport
            initialDelaySeconds: 10
            periodSeconds: 5
            successThreshold: 1
            failureThreshold: 10
          env:
            - name: MOCKSERVER_LIVENESS_HTTP_GET_PATH
              value: /liveness/probe
            - name: MOCKSERVER_LOG_LEVEL
              value: {{ .Values.app.logLevel | quote }}
            - name: SERVER_PORT
              value: {{ .Values.app.serverPort | quote }}
{{- if .Values.app.proxyRemoteHost }}
            - name: PROXY_REMOTE_HOST
              value: {{ .Values.app.proxyRemoteHost | quote }}
{{- end }}
{{- if .Values.app.proxyRemotePort }}
            - name: PROXY_REMOTE_PORT
              value: {{ .Values.app.proxyRemotePort | quote }}
{{- end }}
{{- if .Values.app.jvmOptions }}
            - name: JAVA_TOOL_OPTIONS
              value: {{ .Values.app.jvmOptions | quote }}
{{- end }}
{{- if or .Values.app.config.enabled .Values.app.mountConfigMap }}
            - name: MOCKSERVER_PROPERTY_FILE
              value: /config/{{ .Values.app.propertiesFileName }}
{{- end }}
{{- if .Values.app.persistence.enabled }}
            - name: MOCKSERVER_PERSIST_EXPECTATIONS
              value: "true"
            - name: MOCKSERVER_PERSISTED_EXPECTATIONS_PATH
              value: {{ .Values.app.persistence.mountPath }}/persistedExpectations.json
            - name: MOCKSERVER_INITIALIZATION_JSON_PATH
              value: {{ .Values.app.persistence.mountPath }}/persistedExpectations.json
{{- end }}
{{- if .Values.sidecar.transparentProxy }}
            - name: MOCKSERVER_TRANSPARENT_PROXY_ENABLED
              value: "true"
{{- end }}
          volumeMounts:
            - name: config-volume
              mountPath: /config
{{- if .Values.app.mountedLibsConfigMapName}}
            - name: libs-volume
              mountPath: /libs
{{- end}}
{{- if .Values.app.persistence.enabled }}
            - name: persistence-volume
              mountPath: {{ .Values.app.persistence.mountPath }}
{{- end }}
{{- if .Values.resources }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
{{- end }}
      volumes:
        - name: config-volume
          configMap:
            name: {{ .Values.app.mountedConfigMapName }}
            optional: true
{{- if .Values.app.mountedLibsConfigMapName}}
        - name: libs-volume
          configMap:
            name: {{ .Values.app.mountedLibsConfigMapName }}
            optional: true
{{- end}}
{{- if .Values.app.persistence.enabled }}
        - name: persistence-volume
          persistentVolumeClaim:
            claimName: {{ .Values.app.persistence.existingClaimName | default (include "release.name" .) }}
{{- end }}
{{- with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
{{- end }}
