{{- if and .Values.webhook.enabled (not .Values.webhook.certManager.enabled) }}
# Self-signed TLS bootstrap for the admission webhook — split into two Jobs
# to avoid a deadlock under `helm install --wait` (and GitOps tools like
# ArgoCD/Flux that imply --wait).
#
# Phase 1 (pre-install/pre-upgrade, hook-weight -5):
#   Generates a self-signed CA + server certificate and creates the TLS Secret.
#   Runs BEFORE Helm applies non-hook resources, so the Deployment can mount
#   the Secret and become Ready.
#
# Phase 2 (post-install/post-upgrade, hook-weight 0):
#   Reads ca.crt from the existing Secret and patches it into the
#   MutatingWebhookConfiguration's caBundle. Runs AFTER non-hook resources
#   (including the MWC) exist.
#
# Fresh `helm install`:         pre-install Job → Secret created
#                                → Deployment starts, mounts Secret, becomes Ready
#                                → post-install Job → MWC caBundle patched
#
# `helm install --wait`:        same ordering — no deadlock because the Secret
#                                exists before Helm waits for Deployment readiness.
#
# cert-manager path (webhook.certManager.enabled=true) is unaffected; these
# Jobs are not rendered.

# ============================================================
# Phase 1: RBAC + Job — create TLS Secret (pre-install/pre-upgrade)
# ============================================================
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ template "release.name" . }}-webhook-tls-create
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ template "chart.name" . }}-webhook
    release: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ template "release.name" . }}-webhook-tls-create
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ template "chart.name" . }}-webhook
    release: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["{{ template "release.name" . }}-webhook-tls"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ template "release.name" . }}-webhook-tls-create
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ template "chart.name" . }}-webhook
    release: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ template "release.name" . }}-webhook-tls-create
subjects:
  - kind: ServiceAccount
    name: {{ template "release.name" . }}-webhook-tls-create
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ template "release.name" . }}-webhook-tls-create
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ template "chart.name" . }}-webhook
    release: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: {{ template "chart.name" . }}-webhook-tls-create
    spec:
      serviceAccountName: {{ template "release.name" . }}-webhook-tls-create
      restartPolicy: OnFailure
      containers:
        - name: tls-create
          image: {{ .Values.webhook.tls.setupImage | default "bitnami/kubectl:1.31" }}
          command:
            - /bin/sh
            - -c
            - |
              set -e

              SERVICE_NAME="{{ template "release.name" . }}-webhook"
              NAMESPACE="{{ .Release.Namespace }}"
              SECRET_NAME="{{ template "release.name" . }}-webhook-tls"
              DAYS="{{ .Values.webhook.tls.certValidityDays | default 3650 | int }}"

              # Generate CA key and certificate
              openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out /tmp/ca.key
              openssl req -x509 -new -nodes \
                -key /tmp/ca.key \
                -sha256 \
                -days ${DAYS} \
                -out /tmp/ca.crt \
                -subj "/CN=MockServer Webhook CA"

              # Generate server key (PKCS#8) and CSR
              openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out /tmp/server.key
              cat > /tmp/server.conf <<EOF
              [req]
              req_extensions = v3_req
              distinguished_name = req_distinguished_name
              [req_distinguished_name]
              [v3_req]
              basicConstraints = CA:FALSE
              keyUsage = digitalSignature, keyEncipherment
              extendedKeyUsage = serverAuth
              subjectAltName = @alt_names
              [alt_names]
              DNS.1 = ${SERVICE_NAME}
              DNS.2 = ${SERVICE_NAME}.${NAMESPACE}
              DNS.3 = ${SERVICE_NAME}.${NAMESPACE}.svc
              DNS.4 = ${SERVICE_NAME}.${NAMESPACE}.svc.cluster.local
              EOF

              openssl req -new \
                -key /tmp/server.key \
                -out /tmp/server.csr \
                -subj "/CN=${SERVICE_NAME}.${NAMESPACE}.svc" \
                -config /tmp/server.conf

              # Sign the server certificate with the CA
              openssl x509 -req \
                -in /tmp/server.csr \
                -CA /tmp/ca.crt \
                -CAkey /tmp/ca.key \
                -CAcreateserial \
                -out /tmp/server.crt \
                -days ${DAYS} \
                -sha256 \
                -extensions v3_req \
                -extfile /tmp/server.conf

              # Base64 encode for Kubernetes Secret
              CA_BUNDLE=$(cat /tmp/ca.crt | base64 | tr -d '\n')
              TLS_CRT=$(cat /tmp/server.crt | base64 | tr -d '\n')
              TLS_KEY=$(cat /tmp/server.key | base64 | tr -d '\n')

              # Create or update the TLS secret
              kubectl apply -f - <<EOF
              apiVersion: v1
              kind: Secret
              metadata:
                name: ${SECRET_NAME}
                namespace: ${NAMESPACE}
              type: kubernetes.io/tls
              data:
                tls.crt: ${TLS_CRT}
                tls.key: ${TLS_KEY}
                ca.crt: ${CA_BUNDLE}
              EOF

              echo "TLS Secret ${SECRET_NAME} created in namespace ${NAMESPACE}"

              # Clean up
              rm -f /tmp/ca.key /tmp/ca.crt /tmp/server.key /tmp/server.csr /tmp/server.crt /tmp/server.conf /tmp/ca.srl

# ============================================================
# Phase 2: RBAC + Job — patch MWC caBundle (post-install/post-upgrade)
# ============================================================
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ template "release.name" . }}-webhook-tls-patch
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ template "chart.name" . }}-webhook
    release: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
# Namespace-scoped: read the TLS Secret
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ template "release.name" . }}-webhook-tls-patch
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ template "chart.name" . }}-webhook
    release: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["{{ template "release.name" . }}-webhook-tls"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ template "release.name" . }}-webhook-tls-patch
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ template "chart.name" . }}-webhook
    release: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ template "release.name" . }}-webhook-tls-patch
subjects:
  - kind: ServiceAccount
    name: {{ template "release.name" . }}-webhook-tls-patch
    namespace: {{ .Release.Namespace }}
---
# Cluster-scoped: patch the MutatingWebhookConfiguration caBundle
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ template "release.name" . }}-webhook-tls-patch
  labels:
    app: {{ template "chart.name" . }}-webhook
    release: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["mutatingwebhookconfigurations"]
    resourceNames: ["{{ template "release.name" . }}-sidecar-injector"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ template "release.name" . }}-webhook-tls-patch
  labels:
    app: {{ template "chart.name" . }}-webhook
    release: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ template "release.name" . }}-webhook-tls-patch
subjects:
  - kind: ServiceAccount
    name: {{ template "release.name" . }}-webhook-tls-patch
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ template "release.name" . }}-webhook-tls-patch
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ template "chart.name" . }}-webhook
    release: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: {{ template "chart.name" . }}-webhook-tls-patch
    spec:
      serviceAccountName: {{ template "release.name" . }}-webhook-tls-patch
      restartPolicy: OnFailure
      containers:
        - name: tls-patch
          image: {{ .Values.webhook.tls.setupImage | default "bitnami/kubectl:1.31" }}
          command:
            - /bin/sh
            - -c
            - |
              set -e

              NAMESPACE="{{ .Release.Namespace }}"
              SECRET_NAME="{{ template "release.name" . }}-webhook-tls"
              WEBHOOK_NAME="{{ template "release.name" . }}-sidecar-injector"

              # Read ca.crt from the Secret created by the pre-install Job
              CA_BUNDLE=$(kubectl get secret "${SECRET_NAME}" -n "${NAMESPACE}" \
                -o jsonpath='{.data.ca\.crt}')

              if [ -z "${CA_BUNDLE}" ]; then
                echo "ERROR: ca.crt not found in Secret ${SECRET_NAME}" >&2
                exit 1
              fi

              # Patch the MutatingWebhookConfiguration with the CA bundle
              echo "Patching caBundle into MutatingWebhookConfiguration ${WEBHOOK_NAME}"
              kubectl patch mutatingwebhookconfiguration "${WEBHOOK_NAME}" \
                --type='json' \
                -p="[{\"op\": \"replace\", \"path\": \"/webhooks/0/clientConfig/caBundle\", \"value\": \"${CA_BUNDLE}\"}]"

              echo "caBundle patch complete for ${WEBHOOK_NAME}"
{{- end }}
