replicaCount: 1

releasenameOverride: ""

# Pod-level securityContext, rendered verbatim into the Deployment's
# spec.template.spec.securityContext. Any pod-level field is supported. The most
# common need is fsGroup, so the pod can read/write a mounted PersistentVolume
# (for example when persisting expectations to a PVC — see persistence below).
# Empty by default (no pod securityContext is emitted). Example:
#   podSecurityContext:
#     fsGroup: 2000
#     fsGroupChangePolicy: OnRootMismatch
podSecurityContext: {}

app:
  logLevel: "INFO"
  serverPort: "1080"
  mountedConfigMapName: "mockserver-config"
  mountedLibsConfigMapName: "mockserver-config"
  propertiesFileName: "mockserver.properties"
  readOnlyRootFilesystem: false
  serviceAccountName: default
  runAsUser: 65534
  config:
    enabled: false
    # properties: |
    #   mockserver.initializationJsonPath=/config/initializerJson.json
    # initializerJson: |
    #   [{"httpRequest": {"path": "/example"}, "httpResponse": {"body": "response"}}]
    # extraFiles: {}
    #
    # Chaos proxy example — deploy MockServer as a reverse proxy in front of a
    # real upstream and inject faults into the responses it returns, to test how
    # your services handle an unreliable dependency. Point your service at this
    # MockServer Service instead of the real upstream. See the
    # "Chaos Proxy in Kubernetes" guide:
    # https://www.mock-server.com/mock_server/chaos_testing_kubernetes.html
    #
    # The expectation below matches every path and forwards to the upstream, so a
    # separate mockserver.proxyRemoteHost is not needed. (If persistence.enabled is
    # also true, omit mockserver.initializationJsonPath — the chart sets the
    # initialization path to the persisted-expectations file automatically.)
    #
    #   config:
    #     enabled: true
    #     properties: |
    #       mockserver.initializationJsonPath=/config/initializerJson.json
    #     initializerJson: |
    #       [
    #         {
    #           "httpRequest": { "path": "/.*" },
    #           "httpForward": { "host": "upstream.default.svc.cluster.local", "port": 8080 },
    #           "chaos": {
    #             "errorStatus": 503,
    #             "errorProbability": 0.3,
    #             "retryAfter": "5",
    #             "latency": { "timeUnit": "MILLISECONDS", "value": 500 }
    #           },
    #           "times": { "unlimited": true }
    #         }
    #       ]
    properties: ""
    initializerJson: ""
    extraFiles: {}
  persistence:
    # -- Enable persistent storage for expectations.
    # When enabled, a PersistentVolumeClaim is mounted and MockServer is configured
    # to persist expectations to it, so they survive pod restarts.
    #
    # The chart automatically sets the following environment variables:
    #   MOCKSERVER_PERSIST_EXPECTATIONS=true
    #   MOCKSERVER_PERSISTED_EXPECTATIONS_PATH=/persistence/persistedExpectations.json
    #   MOCKSERVER_INITIALIZATION_JSON_PATH=/persistence/persistedExpectations.json
    #
    # These are safe defaults — any matching property in your mockserver.properties
    # file takes precedence over environment variables.
    #
    # Example - enable with chart-managed PVC (simplest):
    #   persistence:
    #     enabled: true
    #
    # Example - use an existing PVC:
    #   persistence:
    #     enabled: true
    #     existingClaimName: "my-mockserver-data"
    #
    # Example - custom StorageClass and size:
    #   persistence:
    #     enabled: true
    #     storageClass: "gp3"
    #     size: 1Gi
    #
    # Example - clustering with shared storage (ReadWriteMany):
    #   persistence:
    #     enabled: true
    #     accessModes:
    #       - ReadWriteMany
    #     storageClass: "efs-sc"
    enabled: false
    # -- Use an existing PersistentVolumeClaim instead of creating a new one.
    # If empty, the chart creates a PVC automatically.
    existingClaimName: ""
    # -- StorageClass for the PVC. If empty, the cluster default StorageClass is used.
    storageClass: ""
    # -- Access modes for the PVC.
    # Use ReadWriteOnce for single-replica deployments (default).
    # Use ReadWriteMany (with NFS, AWS EFS, or Azure Files) for clustered deployments.
    accessModes:
      - ReadWriteOnce
    # -- Size of the PVC. Expectation JSON files are typically small.
    size: 256Mi
    # -- Mount path inside the container for the persistent volume.
    mountPath: /persistence
    # -- Annotations to add to the PVC (only used when creating a new PVC).
    # Example:
    #   annotations:
    #     helm.sh/resource-policy: keep
    annotations: {}

image:
  repository: mockserver
  snapshot: false
  pullPolicy: IfNotPresent

service:
  annotations: {}
  clusterIP: ""
  externalIPs: []
  loadBalancerIP: ""
  loadBalancerSourceRanges: []
  type: NodePort
  port: 1080
  nodePort: ""
  test:
    image: curlimages/curl:8.20.0

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: mockserver.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

podAnnotations: {}

podLabels: {}

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}

# Sidecar / transparent proxy mode
#
# When `transparentProxy` is enabled MockServer reads the original destination of
# intercepted connections (Linux iptables REDIRECT + nf_conntrack) and forwards
# there, with a graceful Host-header fallback. This requires Linux nodes and the
# NET_ADMIN capability, and is a no-op on non-Linux hosts. The optional iptables
# init container redirects outbound TCP to MockServer so application traffic is
# transparently intercepted without code changes.
#
sidecar:
  enabled: false
  transparentProxy: false
  # Add the NET_ADMIN capability (required for SO_ORIGINAL_DST / iptables). Only
  # applied when transparentProxy is true.
  netAdmin: true
  # Optional iptables init container that REDIRECTs outbound TCP to MockServer.
  # Requires a privileged init container; disable if iptables rules are applied
  # by the platform (e.g. an Istio CNI plugin) instead.
  iptables:
    enabled: false
    image: "istio/proxyv2:1.20.0"
    # Destination ports to redirect to MockServer (the transparent proxy port).
    redirectPorts: "80,443"
    # The MockServer port iptables REDIRECTs intercepted traffic to.
    proxyPort: 1080
    # UID to exclude from iptables REDIRECT. Traffic originating from this UID
    # is returned (not redirected) to prevent MockServer's own upstream egress
    # from looping back to itself. Must match app.runAsUser (default 65534).
    excludeUid: 65534

# Admission webhook for automatic sidecar injection
#
# When enabled, deploys a MutatingAdmissionWebhook that automatically injects
# the MockServer transparent-proxy sidecar and iptables init container into pods
# that opt in via the `mockserver.org/inject: "true"` annotation. Pods in
# namespaces labelled `mockserver.org/sidecar-injection: enabled` (or matching
# the custom namespaceSelector) are evaluated.
#
# This automates what users previously had to configure manually via the
# `sidecar` values above. The webhook approach removes the need to hand-edit
# every Deployment; just label the namespace and annotate the pods.
#
webhook:
  enabled: false
  # Webhook deployment image (the webhook handler itself)
  image:
    repository: mockserver/mockserver-webhook
    tag: ""    # defaults to Chart.AppVersion
    pullPolicy: IfNotPresent
  replicaCount: 1
  # failurePolicy: Ignore means pods are created even if the webhook is down
  failurePolicy: Ignore
  # Timeout for the webhook call (seconds)
  timeoutSeconds: 10
  # Scope for the webhook rule: Namespaced (default) or Cluster
  scope: "Namespaced"
  # namespaceSelector for the MutatingWebhookConfiguration.
  # Default: only namespaces with label `mockserver.org/sidecar-injection: enabled`
  # Override to target different labels.
  # namespaceSelector:
  #   matchLabels:
  #     mockserver.org/sidecar-injection: enabled
  namespaceSelector: {}
  # objectSelector for fine-grained pod selection (in addition to namespaceSelector)
  objectSelector: {}
  # Sidecar injection configuration (what gets injected into target pods)
  sidecar:
    # image: ""                  # defaults to <image.repository>/mockserver:mockserver-<appVersion>
    iptablesImage: "alpine:3.19"
    serverPort: 1080
    redirectPorts: "80,443"
    runAsUser: 65534
    logLevel: "INFO"
  # TLS bootstrap: self-signed (default) or cert-manager.
  # Self-signed: two Helm hook Jobs work together —
  #   1. A pre-install/pre-upgrade Job generates a self-signed CA + server cert
  #      and creates the TLS Secret (so the Deployment can mount it immediately).
  #   2. A post-install/post-upgrade Job reads ca.crt from the Secret and patches
  #      the MutatingWebhookConfiguration's caBundle (the MWC must exist first).
  # This split avoids a deadlock under `helm install --wait` and GitOps tools.
  # No external dependencies.
  certManager:
    enabled: false
    duration: "8760h"     # 1 year
    renewBefore: "720h"   # 30 days
  tls:
    # Image used by the self-signed TLS setup Job (needs openssl + kubectl).
    # Pinned by default; override with your own pinned/mirrored image for production.
    setupImage: "bitnami/kubectl:1.31"
    certValidityDays: 3650
  # caBundle: set this to a base64-encoded CA certificate if you manage TLS
  # yourself (outside both the self-signed Job and cert-manager). When the
  # self-signed Job runs, it patches this value into the webhook config.
  caBundle: ""
  # Resource limits for the webhook deployment
  resources: {}
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

imagePullSecrets: []
