steps:
  - label: ":s3: restore bundler cache"
    command: ".buildkite/scripts/cache-restore.sh bundler mockserver-client-ruby/Gemfile"
    timeout_in_minutes: 5
    soft_fail: true

  - wait

  - label: ":ruby: Ruby client unit tests"
    command: ".buildkite/scripts/steps/ruby-unit-test.sh"
    artifact_paths:
      - "mockserver-client-ruby/test-reports/*.xml"
    timeout_in_minutes: 10

  - label: ":ruby: Ruby client integration tests"
    command: ".buildkite/scripts/steps/ruby-integration-test.sh"
    artifact_paths:
      - "mockserver-client-ruby/test-reports/*.xml"
    timeout_in_minutes: 10

  - wait: ~
    continue_on_failure: true

  - label: ":junit: annotate test results"
    plugins:
      - junit-annotate#8a549e5220869601737287b4d6a9293703dc5a6f:  # v2.7.0
          artifacts: "mockserver-client-ruby/test-reports/*.xml"
          always-annotate: true

  - label: ":s3: save bundler cache"
    command: ".buildkite/scripts/cache-save.sh bundler bundle -- mockserver-client-ruby/Gemfile"
    timeout_in_minutes: 5
    soft_fail: true
