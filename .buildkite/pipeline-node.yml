steps:
  - label: ":s3: restore npm cache"
    command: ".buildkite/scripts/cache-restore.sh npm-node mockserver-client-node/package.json mockserver-node/package.json"
    timeout_in_minutes: 5
    soft_fail: true

  - wait

  - label: ":node: client-node lint and typecheck"
    command: ".buildkite/scripts/steps/node-client-lint.sh"
    timeout_in_minutes: 10

  - label: ":node: :docker: client-node functional tests"
    command: ".buildkite/scripts/steps/node-client-test.sh"
    timeout_in_minutes: 15
    soft_fail: true

  - label: ":node: node launcher lint"
    command: ".buildkite/scripts/steps/node-launcher-lint.sh"
    timeout_in_minutes: 10

  - label: ":node: :java: node launcher integration tests"
    command: ".buildkite/scripts/steps/node-launcher-test.sh"
    timeout_in_minutes: 15

  - label: ":s3: save npm cache"
    command: ".buildkite/scripts/cache-save.sh npm-node npm -- mockserver-client-node/package.json mockserver-node/package.json"
    timeout_in_minutes: 5
    soft_fail: true
