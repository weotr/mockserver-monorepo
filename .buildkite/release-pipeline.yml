# MockServer release pipeline.
#
# This file is intentionally short: every step is a single command. All the
# release logic lives in scripts/release/* which are CI-agnostic.
# See docs/operations/release-principles.md and docs/operations/release-process.md.

steps:
  - input: "Release Parameters"
    fields:
      - text: "Release Version"
        key: "release-version"
        hint: "e.g., 6.1.0"
        required: true
        format: "[0-9]+\\.[0-9]+\\.[0-9]+"
      - text: "Next SNAPSHOT Version"
        key: "next-version"
        hint: "e.g., 6.0.1-SNAPSHOT"
        required: true
        format: "[0-9]+\\.[0-9]+\\.[0-9]+-SNAPSHOT"
      - select: "Release Type"
        key: "release-type"
        default: "full"
        options:
          - { label: "Full Release (all steps)",     value: "full" }
          - { label: "Maven Central Only",           value: "maven-only" }
          - { label: "Docker Image Only (re-pub)",   value: "docker-only" }
          - { label: "Post-Maven (skip Central)",    value: "post-maven" }
      - select: "Create Versioned Site?"
        key: "create-versioned-site"
        default: "no"
        options:
          - { label: "No", value: "no" }
          - { label: "Yes (major/minor release)", value: "yes" }
      - select: "Dry Run?"
        key: "dry-run"
        default: "false"
        options:
          - { label: "No — actually publish",                     value: "false" }
          - { label: "Yes — build/validate only, skip publish",   value: "true" }

  - block: ":lock: TOTP Authorization"
    prompt: "Enter your TOTP code to authorize this release"
    allowed_teams: ["release-managers"]
    fields:
      - text: "TOTP Code"
        key: "totp-code"
        hint: "6-digit code from your authenticator app"
        required: true
        format: "[0-9]{6}"

  - label: ":shield: Verify TOTP"
    command: ".buildkite/scripts/release-verify-totp.sh"
    agents: { queue: "release" }

  - wait

  - label: ":wrench: Prepare"
    command: ".buildkite/scripts/release-runner.sh prepare"
    timeout_in_minutes: 10
    agents: { queue: "release" }

  - wait

  - label: ":maven: Maven Central"
    command: ".buildkite/scripts/release-runner.sh maven-central"
    timeout_in_minutes: 180
    agents: { queue: "release" }

  - wait

  # F-BK-02: a second TOTP check before downstream artifact publishing
  # bounds the blast radius if the build context is compromised between
  # Maven Central publish and downstream artifact deploys (npm, PyPI,
  # RubyGems, Helm, Docker, SwaggerHub, GitHub).
  - block: ":rocket: Approve downstream publish"
    prompt: "Maven Central published. Re-authenticate with a fresh TOTP to authorize downstream artifact publishing."
    allowed_teams: ["release-managers"]
    fields:
      - text: "TOTP Code"
        key: "totp-code-downstream"
        hint: "6-digit code from your authenticator app"
        required: true
        format: "[0-9]{6}"

  - label: ":shield: Verify TOTP (downstream)"
    command: |
      TOTP_CODE="$(buildkite-agent meta-data get totp-code-downstream)" \
        .buildkite/scripts/release-verify-totp.sh
    agents: { queue: "release" }

  - wait

  - label: ":globe_with_meridians: Versioned Site"
    command: ".buildkite/scripts/release-runner.sh versioned-site"
    # Creates CloudFront distributions and mirrors the full historical docs
    # site (~460 MB, 35k+ objects) into the new versioned bucket — both slow.
    #
    # Runs BEFORE Update Version References intentionally: this step reads
    # only terraform state + pom.xml (bumped earlier by prepare), never the
    # files touched by update-version-references (_config.yml, package.json,
    # changelog, etc.). The version-refs commit is sequenced just below.
    timeout_in_minutes: 60
    agents: { queue: "release" }

  - wait

  - label: ":bookmark_tabs: Update Version References"
    command: ".buildkite/scripts/release-runner.sh update-version-references"
    # Must run before the parallel publish group below. The website (and
    # several other downstream publishes) clone the repo on a fresh agent
    # and read the just-committed version from _config.yml / package.json /
    # etc. If this step ran in finalize (as it used to) the website shipped
    # with the previous version's _config.yml.
    timeout_in_minutes: 15
    agents: { queue: "release" }

  - wait

  - group: ":package: Publish artifacts"
    steps:
      - label: ":java: Maven Plugin"
        command: ".buildkite/scripts/release-runner.sh maven-plugin"
        timeout_in_minutes: 60
        agents: { queue: "release" }

      - label: ":docker: Docker Image"
        command: ".buildkite/scripts/release-runner.sh docker"
        timeout_in_minutes: 60
        agents: { queue: "default" }

      - label: ":package: npm"
        command: ".buildkite/scripts/release-runner.sh npm"
        timeout_in_minutes: 30
        agents: { queue: "release" }

      - label: ":helm: Helm Chart"
        command: ".buildkite/scripts/release-runner.sh helm"
        timeout_in_minutes: 15
        agents: { queue: "release" }

      - label: ":book: Javadoc"
        command: ".buildkite/scripts/release-runner.sh javadoc"
        # javadoc.sh does two Maven passes on the full reactor: `mvn install`
        # (~12 min, populates the local repo so `aggregate` can resolve
        # inter-module deps) then `mvn javadoc:aggregate` (~6-8 min). Pad
        # generously over the observed ~20 min total to absorb fresh-agent
        # network variance pulling plugin/dependency POMs from Central.
        timeout_in_minutes: 45
        agents: { queue: "release" }

      - label: ":swagger: SwaggerHub"
        command: ".buildkite/scripts/release-runner.sh swaggerhub"
        # SwaggerHub is an optional mirror of the OpenAPI spec to a third-party
        # catalogue. A failure here (e.g. SwaggerHub account / API access) must
        # not block the release, so the step is allowed to soft-fail.
        soft_fail: true
        timeout_in_minutes: 10
        agents: { queue: "release" }

      - label: ":globe_with_meridians: Website"
        command: ".buildkite/scripts/release-runner.sh website"
        timeout_in_minutes: 15
        agents: { queue: "release" }

      - label: ":page_facing_up: JSON Schema"
        command: ".buildkite/scripts/release-runner.sh schema"
        timeout_in_minutes: 10
        agents: { queue: "release" }

      - label: ":python: PyPI"
        command: ".buildkite/scripts/release-runner.sh pypi"
        timeout_in_minutes: 15
        agents: { queue: "default" }

      - label: ":gem: RubyGems"
        command: ".buildkite/scripts/release-runner.sh rubygems"
        timeout_in_minutes: 10
        agents: { queue: "default" }

      - label: ":github: GitHub Release"
        command: ".buildkite/scripts/release-runner.sh github"
        timeout_in_minutes: 10
        agents: { queue: "release" }

  - wait

  - label: ":sparkles: Finalize"
    command: ".buildkite/scripts/release-runner.sh finalize"
    timeout_in_minutes: 30
    agents: { queue: "release" }

  - wait

  - label: ":mag: Verify"
    # Post-release safety net: hit every public URL we publish to and confirm
    # $RELEASE_VERSION is actually live. Catches silent-skip / silent-success
    # failure modes that the individual component scripts may not surface
    # (e.g. SwaggerHub leaving versions as unpublished drafts before the
    # publish/set-default endpoints were wired in, or Javadoc's `aws s3 sync`
    # being skipped because mvn javadoc:aggregate timed out).
    command: ".buildkite/scripts/release-runner.sh verify"
    timeout_in_minutes: 10
    agents: { queue: "release" }
