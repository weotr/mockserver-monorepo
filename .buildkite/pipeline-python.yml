steps:
  - label: ":s3: restore pip cache"
    command: ".buildkite/scripts/cache-restore.sh pip mockserver-client-python/pyproject.toml"
    timeout_in_minutes: 5
    soft_fail: true

  - wait

  - label: ":python: Python client unit tests"
    command: ".buildkite/scripts/steps/python-unit-test.sh"
    artifact_paths:
      - "mockserver-client-python/test-reports/*.xml"
    timeout_in_minutes: 10

  - label: ":python: Python client integration tests"
    command: ".buildkite/scripts/steps/python-integration-test.sh"
    artifact_paths:
      - "mockserver-client-python/test-reports/*.xml"
    timeout_in_minutes: 20

  - wait: ~
    continue_on_failure: true

  - label: ":junit: annotate test results"
    plugins:
      - junit-annotate#8a549e5220869601737287b4d6a9293703dc5a6f:  # v2.7.0
          artifacts: "mockserver-client-python/test-reports/*.xml"
          always-annotate: true

  - label: ":s3: save pip cache"
    command: ".buildkite/scripts/cache-save.sh pip pip -- mockserver-client-python/pyproject.toml"
    timeout_in_minutes: 5
    soft_fail: true
