steps:
  - label: ":react: UI lint and typecheck"
    command: ".buildkite/scripts/steps/ui-lint.sh"
    timeout_in_minutes: 10

  - label: ":jest: UI tests"
    command: ".buildkite/scripts/steps/ui-test.sh"
    artifact_paths:
      - "mockserver-ui/test-reports/*.xml"
    timeout_in_minutes: 10

  - wait: ~
    continue_on_failure: true

  - label: ":junit: annotate test results"
    plugins:
      - junit-annotate#8a549e5220869601737287b4d6a9293703dc5a6f:  # v2.7.0
          artifacts: "mockserver-ui/test-reports/*.xml"
          always-annotate: true

  - wait

  - label: ":package: UI build"
    command: ".buildkite/scripts/steps/ui-build.sh"
    timeout_in_minutes: 10
