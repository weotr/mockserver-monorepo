# Site settings
title: MockServer
email: jamesdbloom@gmail.com
description: MockServer is an open-source HTTP(S) mock server, proxy, and recorder for testing. Mock any HTTP API, record and replay traffic, and connect AI assistants via the built-in MCP (Model Context Protocol) endpoint. Available as Docker, Maven, npm, Python, and Ruby.
keywords: mockserver, mock server, mock http server, http mock server, mock-server, mock rest service, mock server java, mock api, mock api server, json mock service, api mocking, api proxying, proxy, introspect http, proxy http, proxy https, proxy rest api, mcp server, model context protocol, ai coding assistant, claude code, cursor, windsurf, ai mock api, llm http testing, openapi mock
short_description: Mock HTTP/HTTPS APIs for testing, record and replay traffic, and integrate with AI coding assistants via MCP.
tagline: Mock any HTTP service. Record traffic. Now with MCP for AI assistants.
baseurl: "" # the subpath of your site, e.g. /blog/
url: "https://www.mock-server.com"
github_repo: https://github.com/mock-server/mockserver-monorepo
mockserver_version: 6.1.0
mockserver_api_version: 6.1.x
mockserver_snapshot_version: 6.1.1-SNAPSHOT

