# Integration test: MockServer metrics output on BOTH paths —
#   1. Prometheus scrapes GET /mockserver/metrics (metricsEnabled), and
#   2. MockServer pushes the same metrics via OTLP (otelMetricsEnabled) over
#      HTTP to the configured endpoint.
# The OTLP sink is a second MockServer instance (dogfooding) rather than a real
# OpenTelemetry Collector: the collector's distroless image fails to exec on
# some Docker runtimes (CI agents and local Docker Desktop), and a real
# collector would be testing the collector, not MockServer. Pointing the
# exporter at a MockServer receiver lets the test assert the thing that matters —
# that MockServer actually sends OTLP metric exports over the wire — using only
# images this suite already relies on. (The OTLP encoding itself is unit-tested
# by OtelMetricsExporterTest.)
services:
  mockserver:
    image: mockserver/mockserver:integration_testing
    command: -serverPort 1080
    environment:
      MOCKSERVER_METRICS_ENABLED: "true"
      MOCKSERVER_OTEL_METRICS_ENABLED: "true"
      MOCKSERVER_OTEL_ENDPOINT: "http://otlp-receiver:1080"
      MOCKSERVER_OTEL_METRICS_EXPORT_INTERVAL_SECONDS: "2"
      MOCKSERVER_LOG_LEVEL: "WARN"
    depends_on:
      - otlp-receiver

  otlp-receiver:
    image: mockserver/mockserver:integration_testing
    command: -serverPort 1080
    environment:
      MOCKSERVER_LOG_LEVEL: "WARN"

  prometheus:
    image: prom/prometheus:v3.1.0
    volumes:
      - ${OVERRIDE_DIR}/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  client:
    image: mockserver/mockserver:integration_testing_client_curl
    command: ["sleep", "86400"]
    depends_on:
      - mockserver
      - prometheus
      - otlp-receiver
